<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agar.io 人机对战</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-screen">
        <h1>Agar.io</h1>
        <p class="subtitle">人机对战版</p>
        <div class="settings">
            <div class="setting-item">
                <label for="player-name">玩家名称</label>
                <input type="text" id="player-name" value="玩家" maxlength="10">
            </div>
            <div class="setting-item">
                <label for="enemy-count">敌人数量: <span id="enemy-count-val">5</span></label>
                <input type="range" id="enemy-count" min="1" max="20" value="5">
            </div>
            <div class="setting-item">
                <label for="difficulty">难度</label>
                <select id="difficulty">
                    <option value="easy">简单</option>
                    <option value="medium" selected>中等</option>
                    <option value="hard">困难</option>
                </select>
            </div>
            <div class="setting-item">
                <label for="map-size">地图大小</label>
                <select id="map-size">
                    <option value="2000">小 (2000x2000)</option>
                    <option value="4000" selected>中 (4000x4000)</option>
                    <option value="6000">大 (6000x6000)</option>
                    <option value="8000">超大 (8000x8000)</option>
                </select>
            </div>
            <div class="setting-item">
                <label for="food-count">食物数量: <span id="food-count-val">200</span></label>
                <input type="range" id="food-count" min="50" max="500" value="200" step="10">
            </div>
        </div>
        <button id="start-btn">开始游戏</button>
        <div class="instructions">
            <h3>操作说明</h3>
            <p>🖱️ 鼠标控制移动方向</p>
            <p>🔵 吃掉食物和比你小的细胞来成长</p>
            <p>🔴 避开比你大的敌人</p>
            <p>⌨️ 按 <kbd>Space</kbd> 分裂 | 按 <kbd>W</kbd> 喷射质量</p>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <canvas id="game-canvas"></canvas>
        <div id="hud">
            <div id="score-display">得分: <span id="score">0</span></div>
            <div id="leaderboard">
                <h4>排行榜</h4>
                <ol id="leaderboard-list"></ol>
            </div>
            <div id="minimap-container">
                <canvas id="minimap" width="150" height="150"></canvas>
            </div>
        </div>
        <div id="game-over" class="hidden">
            <h2>游戏结束!</h2>
            <p>最终得分: <span id="final-score">0</span></p>
            <p>存活时间: <span id="survival-time">0</span>秒</p>
            <button id="restart-btn">重新开始</button>
            <button id="menu-btn">返回菜单</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
